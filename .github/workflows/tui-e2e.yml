name: 🎭 Tests TUI E2E

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tui:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.12.0

      - name: Cache devbox
        uses: actions/cache@v4
        with:
          path: |
            .devbox
            /nix/store
          key: devbox-${{ runner.os }}-${{ hashFiles('devbox.json', 'devbox.lock') }}

      - name: Install JS deps
        run: devbox run -- task deps:ci

      - name: Build helmdex
        run: devbox run -- task build

      - name: Run TUI tests
        run: devbox run -- task test-tui:ci

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tui-artifacts
          path: tests/tui/artifacts
