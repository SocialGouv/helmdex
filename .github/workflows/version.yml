name: 🏷️ Version

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version increment"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.12.0

      - name: Cache devbox
        uses: actions/cache@v4
        with:
          path: |
            .devbox
            /nix/store
          key: devbox-${{ runner.os }}-${{ hashFiles('devbox.json', 'devbox.lock') }}

      - name: Install JS deps
        run: devbox run -- corepack pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine increment
        id: increment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.increment }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          devbox run -- corepack pnpm exec release-it
          ${{ steps.increment.outputs.value }}
          --ci
